kind = "mobile"
previewPath = "/"
title = "WIDMAN IOS"
version = "1.0.0"
id = "artifacts/widman-ios"
router = "expo-domain"

[[services]]
name = "expo"
ensurePreviewReachable = "/status"
paths = [ "/" ]
localPort = 19538

[services.development]
run = "pnpm --filter @workspace/widman-ios run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/widman-ios", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/widman-ios", "run", "serve" ]

[services.env]
PORT = "19538"
BASE_PATH = "/"
